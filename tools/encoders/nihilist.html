<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nihilist Cipher Generator</title>
<link rel="stylesheet" href="cipherstyle.css">
</head>
<body>

<h1>Nihilist Cipher Generator</h1>

<form id="nihilistForm" onsubmit="event.preventDefault(); generateNihilistCipher();">
  <label>Question Text:<textarea id="qtext">Decode this Nihilist cipher.</textarea></label>
  <label>Plaintext:<textarea id="plaintext" required></textarea></label>
  <label>Keyword:<input type="text" id="keyword" required></label>
  <label>Polybius Key:<input type="text" id="polybius" required></label>
  <label>Block Size:<input type="number" id="bs" value="3" required></label>
  <label>Value:<input type="number" id="value" value="250" required></label>
  <label>Crib/Hint (optional):<input type="text" id="hint"></label>
  <label>Reveal Keyword (optional):<input type="text" id="revealKeyword"></label>
  <button type="submit">Generate</button>
</form>

<div class="divider"></div>

<div class="preview">
<h2>Preview</h2>
<div id="cipherOutput"><pre></pre></div>
</div>

<div class="divider"></div>

<div class="output">
<h2>LaTeX Output</h2>
<textarea id="latexOutput" readonly rows="15"></textarea>
<button onclick="downloadLatex()">Download LaTeX</button>
</div>

<script src="embed-output.js"></script>
<script>
function createNihilistAlphabet(keyword){
  keyword = keyword.toLowerCase().replace('j','i');
  let seen = new Set();
  let result = [];
  for(let c of keyword){
    if(c.match(/[a-z]/) && !seen.has(c)){
      seen.add(c);
      result.push(c);
    }
  }
  for(let c of "abcdefghiklmnopqrstuvwxyz"){
    if(!seen.has(c)) result.push(c);
  }
  return result.join('');
}

function nihilistEncode(text, key, poly, bs) {
    text = text.toUpperCase().replace(/[^A-Z]/g,"").replace(/J/g,"I");
    key = key.toUpperCase().replace(/J/g,"I");
    poly = createNihilistAlphabet(poly).toUpperCase();

    let pkDict = {};
    for (let i = 0; i < poly.length; i++) {
        pkDict[poly[i]] = Math.floor(i / 5 + 1) * 10 + (i % 5 + 1);
    }

    // Encode text
    let encoded = [];
    let k = 0;
    for (let char of text) {
        encoded.push(pkDict[char] + pkDict[key[k]]);
        k = (k + 1) % key.length;
    }

    // Format like Python: blocks of size bs, 2-3 blocks per line
    let result = "";
    let blockCount = 0;
    let blocksPerLine;

    if (bs === 1) blocksPerLine = 16;
    else if (bs < 7) blocksPerLine = 3;
    else blocksPerLine = 2;

    for (let i = 0; i < encoded.length; i += bs) {
        // Create one block of bs numbers
        let block = encoded.slice(i, i + bs).join(" ");
        if (bs === 1){
            result += block + " ";
        }
        else {
            result += block + "   ";
        }
        blockCount++;
        if (blockCount === blocksPerLine) {
            result += "\n\n\n"; // new line after 2-3 blocks
            blockCount = 0;
        }
    }

    return result.trim();
}




async function generateNihilistCipher(){
  const qtext = document.getElementById("qtext").value;
  const plaintext = document.getElementById("plaintext").value;
  const keyword = document.getElementById("keyword").value;
  const poly = document.getElementById("polybius").value;
  const bs = parseInt(document.getElementById("bs").value);
  const value = document.getElementById("value").value;
  const hint = document.getElementById("hint").value;
  const revealKeyword = document.getElementById("revealKeyword").value;

  const encoded = nihilistEncode(plaintext,keyword,poly,bs);

  // Preview
  document.getElementById("cipherOutput").innerHTML = "<pre>"+encoded+"</pre>";

  // LaTeX
  let latex = [];
  latex.push(`\\normalsize \\question[${value}] ${qtext}`);
  latex.push("\\Large{\\begin{verbatim}");
  latex.push(encoded);
  latex.push("\\end{verbatim}}");
  latex.push("\\begin{tabular}{|m{12pt}|m{12pt}|m{12pt}|m{12pt}|m{12pt}|m{12pt}|}");
  latex.push("\\hline");
  latex.push("&1&2&3&4&5  \\\\");
  latex.push("\\hline");
  latex.push("1&&&&&  \\\\");
  latex.push("\\hline");
  latex.push("2&&&&&  \\\\");
  latex.push("\\hline");
  latex.push("3&&&&&  \\\\");
  latex.push("\\hline");
  latex.push("4&&&&&  \\\\");
  latex.push("\\hline");
  latex.push("5&&&&&  \\\\");
  latex.push("\\hline");
  latex.push("\\end{tabular} \n");
  latex.push("\\vfill \\uplevel{\\hrulefill}");

  await setLatexOrEmbedOutput("latexOutput", revealKeyword, "nihilist", {
    cipherType: "Nihilist",
    questionText: questionTextWithValue(value, qtext),
    cipherText: encoded,
    correctAnswer: lettersOnlyAnswer(plaintext)
  }, latex.join("\n"));
}

function downloadLatex(){
  const text = document.getElementById("latexOutput").value;
  const blob = new Blob([text], {type: "text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "nihilist_cipher.tex";
  a.click();
}
</script>
</body>
</html>
