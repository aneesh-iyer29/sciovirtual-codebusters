<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Day 1 Practice · ScioVirtual Codebusters</title>
  <meta name="description" content="The Day 1 practice problems: a K1 and a K2 Aristocrat you can solve and check live.">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Lato:wght@400;700&family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/cipher.css">
  <script type="module" src="/assets/js/site.js"></script>
  <style>
    .q-block { margin-bottom: 2.6rem; }
    .q-block .eyebrow { margin-bottom: .8rem; }
  </style>
</head>
<body>
  <main id="main">
    <header class="page-head">
      <div class="wrap">
        <p class="crumbs"><a href="/">Home</a> / <a href="/daily-questions/day-1/">Day 1</a> / Practice</p>
        <h1>Day 1 practice set</h1>
        <p class="lead">Two Aristocrats: a K1 and a K2. Each one checks live; once you've solved it, work out the keyword and send it to an instructor.</p>
      </div>
    </header>

    <section class="section">
      <div class="wrap" id="practice"></div>
    </section>
  </main>

  <script src="/assets/js/cipher-engine.js"></script>
  <script>
    const QUESTIONS = [
      {
        cipherType: "Aristocrat",
        aristoType: "K1",
        questionText: "A quote has been encoded using the Aristocrat Cipher using a K1 alphabet and an 8 letter keyword for you to decode. What is the keyword?",
        cipherText: "NFUWJTZ'A PY AMR BZT ABIY AFBA KYMNUZ AU VUWMA, AFYR NAUJY AFY PGZT NAMBGEFA UWA UD XR VFYNA!",
        correctAnswer: "SHOULDN'T WE TRY AND TAKE THAT PERSON TO COURT, THEY STOLE THE WIND STRAIGHT OUT OF MY CHEST!",
        revealKeyword: "Send the keyword above"
      },
      {
        cipherType: "Aristocrat",
        aristoType: "K2",
        questionText: "A quote has been encoded using the Aristocrat Cipher using a K2 alphabet and a 10 letter keyword for you to decode. What is the keyword?",
        cipherText: "KRM XVI'G MVH DHFG EQWU HE MVHB GROIPF QIX PV, GRYBY'F IV EVOIG UYYEOIP MVH QBVHIX QIMTVBY.",
        correctAnswer: "WHY DON'T YOU JUST PACK UP YOUR THINGS AND GO, THERE'S NO POINT KEEPING YOU AROUND ANYMORE.",
        revealKeyword: "Send the keyword above"
      }
    ];

    const root = document.getElementById("practice");
    QUESTIONS.forEach((q, i) => {
      const block = document.createElement("div");
      block.className = "q-block";
      const eb = document.createElement("p");
      eb.className = "eyebrow";
      eb.textContent = "Problem " + String(i + 1).padStart(2, "0") + " · " + q.cipherType;
      const mount = document.createElement("div");
      mount.setAttribute("data-cipher", "");
      block.append(eb, mount);
      root.appendChild(block);
      Codebusters.render(mount, q);
    });
  </script>
</body>
</html>
